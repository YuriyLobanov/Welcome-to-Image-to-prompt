<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image to prompt — sorry to see you go</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f6f3;
    --ink:#16161a;
    --ink-soft:#5d5d68;
    --accent:#5b6cff;
    --line:#e6e4df;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Hanken Grotesk",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 22px}

  header{padding:34px 0 6px;text-align:center}
  .kicker{
    font-weight:600;font-size:12.5px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--accent)
  }
  h1{
    font-family:"Bricolage Grotesque",sans-serif;font-weight:700;
    font-size:clamp(24px,3.6vw,34px);line-height:1.05;letter-spacing:-.02em;margin:6px 0 0
  }
  .sub{margin:9px auto 0;max-width:480px;color:var(--ink-soft);font-size:15px}

  .formbox{
    margin:22px auto 0;border-radius:14px;overflow:hidden;
    border:1px solid var(--line);background:#fff;
    box-shadow:0 24px 50px -28px rgba(20,20,40,.35)
  }
  .formbox iframe{display:block;width:100%;height:760px;border:0}

  footer{padding:26px 0 48px;text-align:center;color:var(--ink-soft);font-size:13px}
  footer .heart{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="kicker">Image to prompt · uninstalled</div>
    <h1>Sorry to see you go</h1>
    <p class="sub">One quick question before you leave — your answer goes straight to the developer and helps make the extension better.</p>
  </header>

  <div class="formbox">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSdkhOboRTxBRw1czNVYRCPA4wIiIjqqb375rbm2QbiXcOMNcA/viewform?embedded=true"
      title="Why have you deleted the app?"
      loading="lazy">Loading…</iframe>
  </div>

  <footer>Image to prompt · thanks for trying it <span class="heart">&hearts;</span></footer>

</div>
</body>
</html>
